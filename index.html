<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Serial Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
  :root{
    --ink:#15140f;          /* near-black, warm */
    --ink-2:#4a463b;        /* muted label */
    --paper:#f3efe6;        /* warm light data surface */
    --paper-2:#e7e1d3;      /* divider / chip */
    --viewport:#161512;     /* dark camera zone */
    --amber:#ffb000;        /* signal amber — the signature */
    --amber-dim:#a8741f;
    --good:#2f7d4f;
    --bad:#c0392b;
    --line:#cfc7b5;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:var(--sans);
    background:var(--paper);
    color:var(--ink);
    -webkit-text-size-adjust:100%;
    padding-bottom:96px; /* room for sticky action bar */
  }
  .wrap{max-width:540px;margin:0 auto}

  /* ---- top bar ---- */
  .topbar{
    position:sticky;top:0;z-index:30;
    display:flex;align-items:baseline;justify-content:space-between;
    gap:12px;padding:14px 16px 12px;
    background:var(--viewport);color:var(--paper);
    border-bottom:2px solid var(--amber);
  }
  .brand{font-family:var(--mono);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber)}
  .count{font-family:var(--mono);font-size:22px;line-height:1;font-weight:600}
  .count small{color:var(--ink-2);color:#9a9486;font-size:13px;font-weight:400}

  /* ---- batch field ---- */
  .batch{
    position:sticky;top:46px;z-index:20;
    background:var(--paper);padding:12px 16px 10px;border-bottom:1px solid var(--line);
  }
  .label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
  .batch input{
    width:100%;font-family:var(--mono);font-size:18px;font-weight:600;
    padding:11px 12px;border:2px solid var(--ink);border-radius:0;background:#fff;color:var(--ink);
  }
  .batch input:focus{outline:3px solid var(--amber);outline-offset:0}

  /* ---- scanner viewport ---- */
  .scanner{background:var(--viewport);padding:16px}
  .stage{position:relative;width:100%;aspect-ratio:4/3;background:#000;overflow:hidden;border:1px solid #2a2823}
  .stage video{width:100%;height:100%;object-fit:cover;display:block}
  .stage.idle .reticle{display:none}
  .reticle{
    position:absolute;left:7%;width:86%;top:40%;height:20%;
    border:2px solid var(--amber);box-shadow:0 0 0 100vmax rgba(0,0,0,.35);
    pointer-events:none;
  }
  .reticle::before{content:"";position:absolute;left:0;right:0;top:0;height:2px;background:var(--amber);
    animation:sweep 1.8s ease-in-out infinite;opacity:.9}
  @keyframes sweep{0%{top:0}50%{top:calc(100% - 2px)}100%{top:0}}
  .placeholder{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
    color:#8c867a;font-family:var(--mono);font-size:13px;letter-spacing:.04em;padding:24px;line-height:1.6;
  }
  .hint{margin:10px 2px 0;font-family:var(--mono);font-size:11px;color:#8c867a;letter-spacing:.03em;text-align:center}

  /* ---- buttons ---- */
  .btnrow{display:flex;gap:10px;margin-top:12px}
  button{font-family:var(--sans);cursor:pointer;border:0;border-radius:0}
  .btn{
    flex:1;padding:15px 14px;font-size:16px;font-weight:700;letter-spacing:.01em;
    background:var(--amber);color:var(--ink);border:2px solid var(--amber);
  }
  .btn:active{transform:translateY(1px)}
  .btn[disabled]{opacity:.45;cursor:not-allowed}
  .btn.ghost{background:transparent;color:var(--paper);border-color:#46423a}
  .btn.dark{background:#2a2823;color:var(--paper);border-color:#2a2823}

  /* ---- review card ---- */
  .review{margin:0 16px;padding:14px;background:#fff;border:2px solid var(--amber);border-top:0}
  .review.hide{display:none}
  .review .raw{font-family:var(--mono);font-size:12px;color:var(--ink-2);margin:0 0 8px;word-break:break-all}
  .serial-edit{
    width:100%;font-family:var(--mono);font-size:24px;font-weight:700;letter-spacing:.04em;
    padding:10px 12px;border:2px solid var(--ink);background:#fff;color:var(--ink);text-transform:uppercase;
  }
  /* ---- list ---- */
  .listhead{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 8px}
  .listhead h2{margin:0;font-size:13px;font-family:var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2)}
  .row{
    display:flex;align-items:center;gap:10px;padding:11px 16px;border-top:1px solid var(--line);background:var(--paper);
  }
  .row.dupe{background:#f7e3df}
  .row .serial{font-family:var(--mono);font-size:16px;font-weight:600;letter-spacing:.03em;flex:1;min-width:0;word-break:break-all}
  .chip{font-family:var(--mono);font-size:11px;background:var(--paper-2);padding:3px 8px;white-space:nowrap}
  .tag{font-family:var(--mono);font-size:10px;padding:2px 6px;letter-spacing:.06em}
  .tag.o{background:#efe9da;color:var(--ink-2)}
  .tag.h{background:#fdecc6;color:var(--amber-dim)}
  .del{background:none;color:var(--bad);font-size:20px;line-height:1;padding:4px 8px;font-weight:700}
  .empty{padding:28px 16px;color:var(--ink-2);font-size:14px;text-align:center}

  /* ---- manual ---- */
  .manual{display:flex;gap:8px;margin:14px 16px 0}
  .manual input{flex:1;font-family:var(--mono);font-size:16px;padding:11px;border:2px solid var(--ink);text-transform:uppercase}
  .manual button{padding:0 16px;font-weight:700;background:var(--ink);color:var(--paper)}

  /* ---- sticky action bar ---- */
  .actionbar{
    position:fixed;left:0;right:0;bottom:0;z-index:40;
    display:flex;gap:10px;padding:12px 16px;max-width:540px;margin:0 auto;
    background:var(--viewport);border-top:2px solid var(--amber);
    padding-bottom:calc(12px + env(safe-area-inset-bottom));
  }
  .actionbar .btn{flex:2}
  .actionbar .btn.minor{flex:1;background:transparent;color:var(--paper);border-color:#46423a;font-weight:600}

  .toast{
    position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:50;
    background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:13px;
    padding:10px 16px;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center;
  }
  .toast.show{opacity:1}

  @media (prefers-reduced-motion: reduce){
    .reticle::before{animation:none;top:50%}
    .btn:active{transform:none}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <span class="brand">Serial&nbsp;Scanner</span>
    <span class="count" id="count">0 <small id="countSub">gescand</small></span>
  </div>

  <div class="batch">
    <label class="label" for="batch">Huidige bestemming / batch</label>
    <input id="batch" placeholder="bv. Locatie A — Antwerpen" autocomplete="off">
  </div>

  <div class="scanner">
    <div class="stage idle" id="stage">
      <video id="video" playsinline muted></video>
      <div class="reticle"></div>
      <div class="placeholder" id="placeholder">Camera uit.<br>Tik op “Camera starten” en richt<br>het vizier op het serienummer (ALT+V).</div>
    </div>
    <p class="hint" id="hint">Tip: zorg dat het serienummer mooi in de amber kader past.</p>
    <div class="btnrow">
      <button class="btn dark" id="camBtn">Camera starten</button>
      <button class="btn" id="scanBtn" disabled>Scan</button>
    </div>
  </div>

  <div class="review hide" id="review">
    <p class="raw" id="rawText">—</p>
    <input class="serial-edit" id="serialEdit" autocomplete="off" spellcheck="false">
    <div class="btnrow">
      <button class="btn dark" id="retryBtn">Opnieuw</button>
      <button class="btn" id="addBtn">Toevoegen</button>
    </div>
  </div>

  <div class="manual">
    <input id="manualInput" placeholder="Of typ serienummer…" autocomplete="off" spellcheck="false">
    <button id="manualBtn">＋</button>
  </div>

  <div class="listhead">
    <h2>Gescand</h2>
  </div>
  <div id="list"></div>

</div>

<div class="actionbar">
  <button class="btn" id="csvBtn">CSV downloaden</button>
  <button class="btn minor" id="clearBtn">Wissen</button>
</div>

<div class="toast" id="toast"></div>

<canvas id="work" hidden></canvas>

<script>
(function(){
  "use strict";

  // ---------- state ----------
  var STORE_KEY = "cb-serial-scanner-v1";
  var rows = [];            // {serial, batch, source, raw, ts}
  var worker = null, workerReady = false, scanning = false, stream = null;

  var $ = function(id){ return document.getElementById(id); };
  var video = $("video"), stage = $("stage"), work = $("work");

  // ---------- safe persistence (degrades silently) ----------
  function save(){
    try{
      localStorage.setItem(STORE_KEY, JSON.stringify({
        rows: rows, batch: $("batch").value
      }));
    }catch(e){ /* storage unavailable — in-memory only */ }
  }
  function load(){
    try{
      var raw = localStorage.getItem(STORE_KEY);
      if(!raw) return;
      var d = JSON.parse(raw);
      if(d.rows) rows = d.rows;
      if(d.batch) $("batch").value = d.batch;
    }catch(e){ /* ignore */ }
  }

  // ---------- helpers ----------
  function norm(s){ return (s||"").toUpperCase().replace(/[^A-Z0-9]/g,""); }

  function toast(msg){
    var t = $("toast"); t.textContent = msg; t.classList.add("show");
    clearTimeout(toast._t); toast._t = setTimeout(function(){ t.classList.remove("show"); }, 1800);
  }

  function updateCount(){
    $("count").firstChild.nodeValue = rows.length + " ";
    $("countSub").textContent = "gescand";
  }

  // ---------- camera ----------
  $("camBtn").addEventListener("click", function(){
    if(stream){ stopCam(); } else { startCam(); }
  });

  function startCam(){
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      toast("Camera niet beschikbaar (HTTPS nodig)"); return;
    }
    navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:"environment" }, width:{ ideal:1920 }, height:{ ideal:1080 } },
      audio:false
    }).then(function(s){
      stream = s; video.srcObject = s; video.play();
      stage.classList.remove("idle");
      $("placeholder").style.display="none";
      $("camBtn").textContent = "Camera uit";
      $("scanBtn").disabled = false;
      initWorker();
    }).catch(function(err){
      toast("Geen cameratoegang");
      console.error(err);
    });
  }
  function stopCam(){
    if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream=null; }
    video.srcObject=null;
    stage.classList.add("idle");
    $("placeholder").style.display="flex";
    $("camBtn").textContent = "Camera starten";
    $("scanBtn").disabled = true;
  }

  // ---------- OCR worker ----------
  function initWorker(){
    if(worker || !window.Tesseract) return;
    $("hint").textContent = "OCR-engine laden… (eenmalig, even geduld)";
    Tesseract.createWorker("eng", 1, {
      logger: function(m){
        if(m.status==="recognizing text"){
          $("hint").textContent = "Herkennen… " + Math.round(m.progress*100) + "%";
        }
      }
    }).then(function(w){
      worker = w;
      return w.setParameters({
        tessedit_char_whitelist: "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789",
        tessedit_pageseg_mode: "7"  // single text line
      });
    }).then(function(){
      workerReady = true;
      $("hint").textContent = "Klaar om te scannen.";
    }).catch(function(e){
      $("hint").textContent = "OCR kon niet laden — gebruik handmatige invoer.";
      console.error(e);
    });
  }

  // crop the reticle band from the live frame, upscale + grayscale, return canvas
  function grabFrame(){
    var vw = video.videoWidth, vh = video.videoHeight;
    if(!vw || !vh) return null;
    // same fractions as the .reticle CSS box
    var cx = 0.07*vw, cw = 0.86*vw, cy = 0.40*vh, ch = 0.20*vh;
    var scale = 2.4;
    work.width = Math.round(cw*scale);
    work.height = Math.round(ch*scale);
    var ctx = work.getContext("2d");
    ctx.drawImage(video, cx, cy, cw, ch, 0, 0, work.width, work.height);
    // grayscale + contrast stretch (helps with screen glare)
    var img = ctx.getImageData(0,0,work.width,work.height), p = img.data;
    for(var i=0;i<p.length;i+=4){
      var g = 0.299*p[i] + 0.587*p[i+1] + 0.114*p[i+2];
      g = (g-128)*1.5 + 128;          // contrast
      g = g<0?0:g>255?255:g;
      p[i]=p[i+1]=p[i+2]=g;
    }
    ctx.putImageData(img,0,0);
    return work;
  }

  $("scanBtn").addEventListener("click", function(){
    if(scanning) return;
    if(!workerReady){ toast("OCR nog niet klaar"); return; }
    var canvas = grabFrame();
    if(!canvas){ toast("Geen camerabeeld"); return; }
    scanning = true; $("scanBtn").disabled = true; $("hint").textContent = "Herkennen…";
    worker.recognize(canvas).then(function(res){
      scanning=false; $("scanBtn").disabled=false;
      var raw = (res.data.text||"").trim();
      var cleaned = norm(raw);
      showReview(raw, cleaned);
    }).catch(function(e){
      scanning=false; $("scanBtn").disabled=false;
      $("hint").textContent = "Herkenning mislukt — probeer opnieuw of typ handmatig.";
      console.error(e);
    });
  });

  // ---------- review ----------
  function showReview(raw, cleaned){
    var rv = $("review");
    rv.classList.remove("hide");
    $("rawText").textContent = "OCR: " + (raw || "(niets gelezen)");
    $("serialEdit").value = cleaned;
    $("serialEdit").focus();
    $("hint").textContent = "Controleer het nummer en tik Toevoegen.";
  }
  function hideReview(){ $("review").classList.add("hide"); }

  $("retryBtn").addEventListener("click", hideReview);
  $("addBtn").addEventListener("click", function(){
    var serial = norm($("serialEdit").value);
    if(!serial){ toast("Leeg serienummer"); return; }
    addRow(serial, "ocr", $("rawText").textContent.replace(/^OCR:\s*/,""));
    hideReview();
    toast("Toegevoegd: " + serial);
  });

  // ---------- manual ----------
  $("manualBtn").addEventListener("click", manualAdd);
  $("manualInput").addEventListener("keydown", function(e){ if(e.key==="Enter") manualAdd(); });
  function manualAdd(){
    var serial = norm($("manualInput").value);
    if(!serial){ return; }
    addRow(serial, "handmatig", "");
    $("manualInput").value="";
    toast("Toegevoegd: " + serial);
  }

  // ---------- rows ----------
  function addRow(serial, source, raw){
    rows.unshift({
      serial: serial, batch: $("batch").value.trim(),
      source: source, raw: raw||"", ts: new Date().toISOString()
    });
    save(); render();
  }
  function delRow(idx){ rows.splice(idx,1); save(); render(); }

  function isDupe(serial, idx){
    for(var i=0;i<rows.length;i++){ if(i!==idx && rows[i].serial===serial) return true; }
    return false;
  }

  function render(){
    var list = $("list");
    list.innerHTML="";
    if(!rows.length){
      list.innerHTML = '<p class="empty">Nog niets gescand. Stel een bestemming in, start de camera en scan.</p>';
      updateCount(); return;
    }
    rows.forEach(function(r, idx){
      var row = document.createElement("div");
      row.className = "row" + (isDupe(r.serial, idx) ? " dupe":"");
      var tag = r.source==="handmatig" ? '<span class="tag h">handm.</span>' : '<span class="tag o">ocr</span>';
      var dupe = isDupe(r.serial, idx) ? '<span class="tag h">dubbel</span>' : '';
      row.innerHTML =
        '<span class="serial">'+escapeHtml(r.serial)+'</span>'+
        (r.batch?'<span class="chip">'+escapeHtml(r.batch)+'</span>':'')+
        tag + dupe +
        '<button class="del" aria-label="verwijder">×</button>';
      row.querySelector(".del").addEventListener("click", function(){ delRow(idx); });
      list.appendChild(row);
    });
    updateCount();
  }

  function escapeHtml(s){ return (s||"").replace(/[&<>"']/g,function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); }

  // ---------- CSV ----------
  function csvCell(v){
    v = (v==null?"":String(v));
    return /[",\r\n;]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
  }
  $("csvBtn").addEventListener("click", function(){
    if(!rows.length){ toast("Niets om te exporteren"); return; }
    var header = ["serienummer","bestemming","bron","ocr_ruw","tijdstip"];
    var lines = [header.join(",")];
    // export oldest-first for readability
    rows.slice().reverse().forEach(function(r){
      lines.push([ csvCell(r.serial), csvCell(r.batch), csvCell(r.source),
                   csvCell(r.raw), csvCell(r.ts) ].join(","));
    });
    var blob = new Blob(["\uFEFF"+lines.join("\r\n")], {type:"text/csv;charset=utf-8"});
    var d = new Date(), pad=function(n){return (n<10?"0":"")+n;};
    var name = "chromebook-serials-"+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+
               "-"+pad(d.getHours())+pad(d.getMinutes())+".csv";
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob); a.download = name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
    toast(rows.length + " regels geëxporteerd");
  });

  $("clearBtn").addEventListener("click", function(){
    if(!rows.length){ return; }
    if(confirm("Alle "+rows.length+" gescande regels wissen? (Download eerst je CSV als je die nog nodig hebt.)")){
      rows=[]; save(); render(); toast("Lijst gewist");
    }
  });

  $("batch").addEventListener("input", save);

  // ---------- init ----------
  load();
  render();
  if(!window.isSecureContext){
    $("hint").textContent = "Let op: camera vereist HTTPS. Host dit bestand (bv. GitHub Pages).";
  }
})();
</script>
</body>
</html>
